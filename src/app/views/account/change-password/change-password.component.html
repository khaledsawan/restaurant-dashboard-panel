<c-row>
  <c-col md="8" lg="6">
    <c-card class="mb-4">
      <c-card-header>
        <strong>Change Password</strong>
      </c-card-header>
      <c-card-body>
        <form cForm [formGroup]="form" (ngSubmit)="submit()">
          @if (errorMessage) {
            <c-alert color="danger">{{ errorMessage }}</c-alert>
          }
          @if (successMessage) {
            <c-alert color="success">{{ successMessage }}</c-alert>
          }
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input cFormControl type="password" formControlName="currentPassword" />
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input cFormControl type="password" formControlName="newPassword" />
          </div>
          <button cButton color="primary" type="submit" [disabled]="submitting">
            {{ submitting ? 'Saving...' : 'Update Password' }}
          </button>
        </form>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
