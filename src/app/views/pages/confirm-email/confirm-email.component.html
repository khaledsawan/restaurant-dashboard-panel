<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container>
    <c-row class="justify-content-center">
      <c-col md="7" lg="6" xl="5">
        <c-card class="p-4">
          <c-card-body>
            <form cForm [formGroup]="form" (ngSubmit)="submit()">
              <h1>Confirm Email</h1>
              <p class="text-body-secondary">Enter your confirmation token.</p>
              @if (errorMessage) {
                <c-alert color="danger">{{ errorMessage }}</c-alert>
              }
              @if (successMessage) {
                <c-alert color="success">{{ successMessage }}</c-alert>
              }
              <c-input-group class="mb-3">
                <span cInputGroupText>&#64;</span>
                <input autoComplete="email" cFormControl placeholder="Email" type="email" formControlName="email" />
              </c-input-group>
              <c-input-group class="mb-4">
                <span cInputGroupText>
                  <svg cIcon name="cilShieldAlt"></svg>
                </span>
                <input cFormControl placeholder="Confirmation token" type="text" formControlName="token" />
              </c-input-group>
              <div class="d-grid mb-3">
                <button cButton color="primary" type="submit" [disabled]="submitting">
                  {{ submitting ? 'Confirming...' : 'Confirm Email' }}
                </button>
              </div>
              <div class="text-center">
                <a cButton color="link" routerLink="/login">Back to login</a>
              </div>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
